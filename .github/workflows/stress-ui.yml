name: 🧪 UI/UX Stress Test (30 jobs sequenciais)

# 30 jobs encadeados via "needs": cada job depende do anterior, formando
# uma cadeia linear. Serve para estressar o grafo de visualização do
# GitHub Actions (setas entre jobs, scroll horizontal/vertical, etc).
# Nada de build/deploy real — cada job tem 1 step inofensivo (echo/sleep).

on:
  workflow_dispatch:
    inputs:
      atraso:
        description: "Segundos de sleep por job (para ver a UI 'em progresso')"
        required: false
        default: "2"
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  job-01:
    name: "01 · Início da cadeia"
    runs-on: ubuntu-latest
    steps:
      - name: Executar job 01
        run: |
          echo "Rodando job 01 de 30"
          sleep ${{ github.event.inputs.atraso || '2' }}

  job-02:
    name: "02 · Job sequencial"
    runs-on: ubuntu-latest
    needs: job-01
    steps:
      - name: Executar job 02
        run: |
          echo "Rodando job 02 de 30"
          sleep ${{ github.event.inputs.atraso || '2' }}

  job-03:
    name: "03 · Nome intencionalmente muito longo para ver como o GitHub trunca ou quebra a linha no grafo e na barra lateral de jobs"
    runs-on: ubuntu-latest
    needs: job-02
    steps:
      - name: Executar job 03
        run: |
          echo "Rodando job 03 de 30"
          sleep ${{ github.event.inputs.atraso || '2' }}

  job-04:
